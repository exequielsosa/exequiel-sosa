name: Generate Blog Post

# Runs the technical blog generator twice a week:
#   - Mondays    11:00 UTC = 08:00 ARG → front-end track
#   - Thursdays  11:00 UTC = 08:00 ARG → AI track
# Can also be triggered manually from the Actions tab with optional flags
# (dry-run, forced track).

on:
  schedule:
    - cron: "0 11 * * 1,4"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do NOT publish — logs the payload only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      track:
        description: "Force track (leave empty to use the day-of-week default)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "frontend"
          - "ai"

# Single in-flight run per branch; prevents two simultaneous publishes.
concurrency:
  group: blog-generator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate and publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run blog generator
        id: generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
        run: |
          set -o pipefail
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.track }}" ]; then
            ARGS="$ARGS --track=${{ github.event.inputs.track }}"
          fi
          echo "Running with args: $ARGS"
          node scripts/scrape-blog.mjs $ARGS 2>&1 | tee blog-generator.log
          exit ${PIPESTATUS[0]}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-generator-${{ github.run_number }}
          path: blog-generator.log
          retention-days: 30
